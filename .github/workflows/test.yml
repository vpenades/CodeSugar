name: Run Tests

on: [push, pull_request]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:        
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |            
            8.0.x
            10.0.x

      # ---------------------------------------------  Android SDK

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'          

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      # ---------------------------------------------  Workloads

      - name: Install Workload
        run: dotnet workload install wasi-experimental android  # ios and maui-ios are not supported in ubuntu machines https://github.com/dotnet/maui/issues/15929

      # ---------------------------------------------  restores

      - name: Install tools
        run: dotnet tool restore

      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build

      - name: Test 1
        run: dotnet test ./tests/CodeSugar.Tests/CodeSugar.Tests.csproj

      - name: Test 2
        run: dotnet test ./tests/CodeSugar.IO.Tests/CodeSugar.IO.Tests.csproj
